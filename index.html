<!doctype html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Tung Sahur Horror</title>
  <style>
    html, body {
      background: #000;
      width: 100%;
      height: 100%;
      overflow: hidden;
      padding: 0;
      margin: 0;
    }

    #gameContainer {
      position: absolute;
      display: none;
    }

    #gameContainer canvas {
      position: absolute;
      display: block;
    }

    #loadingBar {
      color: white;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: Arial, sans-serif;
      text-align: center;
    }

    #loadingSub {
      display: block;
      margin-top: 8px;
      font-size: 13px;
      color: #bbb;
    }
  </style>
</head>
<body>

  <script id="gmsoft-jssdk" src="gmsoftsdk_v5.js"></script>

  <div id="gameContainer">
    <canvas id="unity-canvas"></canvas>
  </div>

  <div id="loadingBar">
    loading... <span id="pct">0%</span>
    <span id="loadingSub">preparing files</span>
  </div>

  <script>
    console.log("Escape Road City 2 local build index loaded.");

    function firebaseLogEvent(event_name) {
      console.log("firebaseLogEvent (stubbed):", event_name);
    }

    function firebaseLogEventParameter(event_name, event_param) {
      console.log("firebaseLogEventParameter (stubbed):", event_name, event_param);
    }

    function firebaseSetUserProperties(props) {
      console.log("firebaseSetUserProperties (stubbed):", props);
    }
  </script>

  <script>
    var canvas = document.getElementById("unity-canvas");
    var container = document.getElementById("gameContainer");
    var loadingBar = document.getElementById("loadingBar");
    var pct = document.getElementById("pct");
    var loadingSub = document.getElementById("loadingSub");

    var buildUrl = ".";
    var config = {
      dataUrl: "",
      frameworkUrl: buildUrl + "/escape-road-city-2-v25103106.framework.js.unityweb",
      codeUrl: buildUrl + "/escape-road-city-2-v25103106.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "azgames.io",
      productName: "Tung Sahur Horror",
      productVersion: "25051505",
      pubId: "",
      gameId: "tung-sahur-horror",
      enableMoreGame: "yes",
      enablePromotion: true,
      eventLog: false
    };

    function onResize() {
      var w = window.innerWidth;
      var h = window.innerHeight;
      var r = 540 / 960;

      if (w * r > h) {
        w = Math.ceil(h / r);
      }

      h = Math.floor(w * r);

      container.style.width = canvas.style.width = w + "px";
      container.style.height = canvas.style.height = h + "px";
      container.style.top = Math.floor((window.innerHeight - h) / 2) + "px";
      container.style.left = Math.floor((window.innerWidth - w) / 2) + "px";
    }

    onResize();
    window.addEventListener("resize", onResize);

    async function fetchBinaryWithProgress(url, onChunk) {
      var response = await fetch(url, { credentials: "same-origin" });
      if (!response.ok) {
        throw new Error("Failed to fetch " + url + " (" + response.status + ")");
      }

      if (!response.body) {
        return await response.arrayBuffer();
      }

      var reader = response.body.getReader();
      var chunks = [];
      var total = 0;

      while (true) {
        var result = await reader.read();
        if (result.done) break;
        chunks.push(result.value);
        total += result.value.length;
        if (typeof onChunk === "function") {
          onChunk(result.value.length);
        }
      }

      var merged = new Uint8Array(total);
      var offset = 0;

      for (var i = 0; i < chunks.length; i++) {
        merged.set(chunks[i], offset);
        offset += chunks[i].length;
      }

      return merged.buffer;
    }

    async function mergeDataParts(files) {
      var loadedBytes = 0;

      function updateLoaded(delta) {
        loadedBytes += delta;
        var mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
        loadingSub.textContent = "downloading data... " + mbDone + " MB";
      }

      var buffers = [];
      for (var i = 0; i < files.length; i++) {
        loadingSub.textContent = "downloading part " + (i + 1) + " of " + files.length;
        var buffer = await fetchBinaryWithProgress(files[i], updateLoaded);
        buffers.push(new Uint8Array(buffer));
      }

      var totalLength = 0;
      for (var j = 0; j < buffers.length; j++) {
        totalLength += buffers[j].length;
      }

      var merged = new Uint8Array(totalLength);
      var offset = 0;
      for (var k = 0; k < buffers.length; k++) {
        merged.set(buffers[k], offset);
        offset += buffers[k].length;
      }

      loadingSub.textContent = "merging data";
      return URL.createObjectURL(new Blob([merged]));
    }

    async function prepareDataFile() {
      var dataParts = [
        "escape-road-city-2-v25103106.data.unityweb.part1",
        "escape-road-city-2-v25103106.data.unityweb.part2"
      ];

      config.dataUrl = await mergeDataParts(dataParts);
    }

    function loadUnityLoader() {
      var script = document.createElement("script");
      script.src = buildUrl + "/escape-road-city-2-v25103106.loader.js";

      script.onload = function() {
        loadingSub.textContent = "starting unity";

        createUnityInstance(canvas, config, function(progress) {
          pct.innerText = Math.round(progress * 100) + "%";
        }).then(function(instance) {
          window.unityInstance = instance;
          setTimeout(function() {
            loadingBar.style.display = "none";
            container.style.display = "block";
            window.focus();
            onResize();
          }, 2000);
        }).catch(function(msg) {
          console.log("Unity load error:", msg);
          loadingBar.innerHTML = 'failed to load<br><span id="loadingSub">check console for details</span>';
        });
      };

      script.onerror = function() {
        console.log("Failed to load Unity loader script.");
        loadingBar.innerHTML = 'failed to load<br><span id="loadingSub">loader file missing or wrong path</span>';
      };

      document.body.appendChild(script);
    }

    (async function startGame() {
      try {
        await prepareDataFile();
        loadUnityLoader();
      } catch (err) {
        console.log("Startup error:", err);
        loadingBar.innerHTML = 'failed to load<br><span id="loadingSub">' + String(err && err.message ? err.message : err) + '</span>';
      }
    })();
  </script>
</body>
</html>
