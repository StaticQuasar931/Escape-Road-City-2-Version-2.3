<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Escape Road City 2</title>

  <style>
    html, body {
      background: #000;
      width: 100%;
      height: 100%;
      overflow: hidden;
      padding: 0;
      margin: 0;
    }

    body {
      position: relative;
    }

    #gameContainer {
      position: absolute;
      display: none;
    }

    #gameContainer canvas {
      position: absolute;
      display: block;
    }

    #loadingBar {
      color: #fff;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: Arial, sans-serif;
      font-size: 20px;
      text-align: center;
      z-index: 10;
    }
  </style>
</head>
<body>
  <script id="gmsoft-jssdk" src="gmsoftsdk_v5.js"></script>

  <div id="gameContainer">
    <canvas id="unity-canvas"></canvas>
  </div>

  <div id="loadingBar">
    loading... <span id="pct">0%</span>
  </div>

  <script>
    console.log("Escape Road City 2 local build index loaded.");

    function firebaseLogEvent(event_name) {
      console.log("firebaseLogEvent (stubbed):", event_name);
    }

    function firebaseLogEventParameter(event_name, event_param) {
      console.log("firebaseLogEventParameter (stubbed):", event_name, event_param);
    }

    function firebaseSetUserProperties(props) {
      console.log("firebaseSetUserProperties (stubbed):", props);
    }

    var canvas = document.getElementById("unity-canvas");
    var container = document.getElementById("gameContainer");
    var loadingBar = document.getElementById("loadingBar");
    var pct = document.getElementById("pct");

    var buildUrl = "Build";
    var config = {
      dataUrl: buildUrl + "/escape-road-city-2-v25103106.data.unityweb",
      frameworkUrl: buildUrl + "/escape-road-city-2-v25103106.framework.js.unityweb",
      codeUrl: buildUrl + "/escape-road-city-2-v25103106.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "azgames.io",
      productName: "Escape Road City 2",
      productVersion: "v25103106",
      pubId: "",
      gameId: "escape-road-city-2",
      enableMoreGame: "yes",
      enablePromotion: true,
      eventLog: false
    };

    function onResize() {
      var w = window.innerWidth;
      var h = window.innerHeight;
      var r = 540 / 960;

      if (w * r > h) {
        w = Math.ceil(h / r);
      }

      h = Math.floor(w * r);

      container.style.width = w + "px";
      container.style.height = h + "px";
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      container.style.top = Math.floor((window.innerHeight - h) / 2) + "px";
      container.style.left = Math.floor((window.innerWidth - w) / 2) + "px";
    }

    onResize();
    window.addEventListener("resize", onResize);

    var script = document.createElement("script");
    script.src = buildUrl + "/escape-road-city-2-v25103106.loader.js";

    script.onload = function() {
      createUnityInstance(canvas, config, function(progress) {
        pct.innerText = Math.round(progress * 100) + "%";
      }).then(function(instance) {
        window.unityInstance = instance;

        setTimeout(function() {
          loadingBar.style.display = "none";
          container.style.display = "block";
          window.focus();
          onResize();
        }, 2000);
      }).catch(function(msg) {
        console.log("Unity load error:", msg);
        loadingBar.innerHTML = "failed to load";
      });
    };

    script.onerror = function() {
      console.log("Failed to load Unity loader script.");
      loadingBar.innerHTML = "failed to load";
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
