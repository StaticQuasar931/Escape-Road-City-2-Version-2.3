<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8" />
  <title>Tung Sahur Horror</title>
  <style>
    html, body { background: #000; width: 100%; height: 100%; overflow: hidden; padding: 0; margin: 0; }
    #gameContainer { position: absolute; }
    #gameContainer canvas { position: absolute; }
  </style>
</head>
<body>

  <script id="gmsoft-jssdk" src="gmsoftsdk_v5.js"></script>

  <div id="gameContainer" style="display:none;">
    <canvas id="unity-canvas"></canvas>
  </div>

  <div id="loadingBar" style="color:white; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-family:Arial;">
    loading... <span id="pct">0%</span>
  </div>

  <script>
    console.log("Escape Road City 2 local build index loaded.");

    function firebaseLogEvent(event_name) {
      console.log("firebaseLogEvent (stubbed):", event_name);
    }
    function firebaseLogEventParameter(event_name, event_param) {
      console.log("firebaseLogEventParameter (stubbed):", event_name, event_param);
    }
    function firebaseSetUserProperties(props) {
      console.log("firebaseSetUserProperties (stubbed):", props);
    }
  </script>

  <script>
    window.fileMergerConfig = {
      files: [
        { name: "escape-road-city-2-v25103106.data.unityweb", parts: 2 }
      ],
      basePath: "./",
      debug: true
    };
  </script>

  <script>
    async function mergeSplitFile(fileName, parts, basePath) {
      var buffers = [];
      var totalLength = 0;

      for (var i = 1; i <= parts; i++) {
        var partUrl = basePath + fileName + ".part" + i;
        var response = await fetch(partUrl, { credentials: "same-origin" });

        if (!response.ok) {
          throw new Error("Failed to fetch split file part: " + partUrl + " (" + response.status + ")");
        }

        var buffer = await response.arrayBuffer();
        var uint8 = new Uint8Array(buffer);
        buffers.push(uint8);
        totalLength += uint8.length;
      }

      var merged = new Uint8Array(totalLength);
      var offset = 0;

      for (var j = 0; j < buffers.length; j++) {
        merged.set(buffers[j], offset);
        offset += buffers[j].length;
      }

      return URL.createObjectURL(new Blob([merged]));
    }

    async function prepareMergedFiles(config) {
      var result = {};
      for (var i = 0; i < config.files.length; i++) {
        var entry = config.files[i];
        result[entry.name] = await mergeSplitFile(entry.name, entry.parts, config.basePath);
      }
      return result;
    }
  </script>

  <script>
    var canvas = document.getElementById("unity-canvas");
    var container = document.getElementById("gameContainer");
    var loadingBar = document.getElementById("loadingBar");

    var buildUrl = ".";
    var config = {
      dataUrl: buildUrl + "/escape-road-city-2-v25103106.data.unityweb",
      frameworkUrl: buildUrl + "/escape-road-city-2-v25103106.framework.js.unityweb",
      codeUrl: buildUrl + "/escape-road-city-2-v25103106.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "azgames.io",
      productName: "Tung Sahur Horror",
      productVersion: "25051505",
      pubId: "",
      gameId: "tung-sahur-horror",
      enableMoreGame: "yes",
      enablePromotion: true,
      eventLog: false,
      autoSyncPersistentDataPath: true
    };

    function onResize() {
      var w = window.innerWidth;
      var h = window.innerHeight;
      var r = 540 / 960;
      if (w * r > h) w = Math.ceil(h / r);
      h = Math.floor(w * r);
      container.style.width = canvas.style.width = w + "px";
      container.style.height = canvas.style.height = h + "px";
      container.style.top = Math.floor((window.innerHeight - h) / 2) + "px";
      container.style.left = Math.floor((window.innerWidth - w) / 2) + "px";
    }
    onResize();
    window.addEventListener("resize", onResize);

    (async function () {
      try {
        var mergedFiles = await prepareMergedFiles(window.fileMergerConfig);
        if (mergedFiles["escape-road-city-2-v25103106.data.unityweb"]) {
          config.dataUrl = mergedFiles["escape-road-city-2-v25103106.data.unityweb"];
        }

        var script = document.createElement("script");
        script.src = buildUrl + "/escape-road-city-2-v25103106.loader.js";
        script.onload = function() {
          createUnityInstance(canvas, config, function(progress) {
            document.getElementById("pct").innerText = Math.round(progress * 100) + "%";
          }).then(function(instance) {
            window.unityInstance = instance;
            setTimeout(function() {
              loadingBar.style.display = "none";
              container.style.display = "block";
              window.focus();
            }, 2000);
          }).catch(function(msg) {
            console.log("Unity load error:", msg);
            loadingBar.innerHTML = "failed to load";
          });
        };
        script.onerror = function() {
          console.log("Failed to load Unity loader script.");
          loadingBar.innerHTML = "failed to load";
        };
        document.body.appendChild(script);
      } catch (err) {
        console.log("Startup error:", err);
        loadingBar.innerHTML = "failed to load";
      }
    })();
  </script>
</body>
</html>
